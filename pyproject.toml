FROM python:3.11-slim

WORKDIR /app

RUN apt-get update && apt-get install -y --no-install-recommends \
    build-essential \
    && rm -rf /var/lib/apt/lists/*

COPY pyproject.toml .
COPY docmind/ ./docmind/
COPY config.yaml .

RUN pip install --no-cache-dir ".[qdrant,rerank]"

ENV DOCMIND_CONFIG=config.yaml

EXPOSE 8000

CMD ["uvicorn", "docmind.server:app", "--host", "0.0.0.0", "--port", "8000"]
